name: update-calendar

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Number of pages to fetch from Weibo'
        required: false
        default: '6'

permissions:
  contents: write
  issues: write

jobs:
  run:
    runs-on: self-hosted
    # No `defaults.run.shell` override here. This runner is a bare Windows
    # machine with no Git Bash/WSL on PATH ("bash: command not found" when
    # shell:bash was forced) -- so steps below run in this runner's actual
    # default shell, Windows PowerShell (powershell.exe 5.1, confirmed
    # present from the earlier execution-policy fix), and are written in
    # PowerShell-compatible syntax (no bash-only `||`/`&&` chaining).
    steps:
      - name: Remove stale git lock files
        # A previous run may have exited mid-git-operation and left a lock
        # file behind. actions/checkout@v4 treats an unclean lock as a fatal
        # error and falls back to re-cloning the repo from scratch -- which
        # deletes gitignored untracked files (e.g. weibo_cookie.txt). Removing
        # any stale locks before checkout prevents that fallback entirely.
        run: |
          if (Test-Path .git/HEAD.lock) { Remove-Item .git/HEAD.lock -Force }
          if (Test-Path .git/index.lock) { Remove-Item .git/index.lock -Force }

      - uses: actions/checkout@v4
        with:
          # Default clean:true runs `git clean -ffdx` before checkout, which
          # would delete weibo_cookie.txt (a manually-placed, gitignored,
          # untracked file -- see README "Weibo login wall") every run,
          # before run_pipeline.py even starts. clean:false leaves untracked
          # files alone while still updating tracked ones normally.
          clean: false

      - name: Restore Weibo cookie
        # weibo_cookie.txt is gitignored (never committed) -- it holds a
        # real logged-in Weibo session cookie. Store it as a repo secret
        # WEIBO_COOKIE so it survives even if the runner workspace is wiped.
        # If the secret is absent the step is a no-op (the file stays
        # wherever it was, or the pipeline will error with a clear message).
        env:
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
        run: |
          if ($env:WEIBO_COOKIE) {
            [System.IO.File]::WriteAllText("weibo_cookie.txt", $env:WEIBO_COOKIE, [System.Text.UTF8Encoding]::new($false))
          }

      - name: Run pipeline
        id: pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_pipeline.py --max-pages ${{ github.event.inputs.max_pages || 6 }}
        continue-on-error: true

      - name: Commit and push if changed
        if: steps.pipeline.outcome == 'success'
        run: |
          git config user.name "calendar-bot"
          git config user.email "calendar-bot@users.noreply.github.com"
          git add feeds data
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update schedule feeds"
          }
          git push

      - name: Upload ICS to Tencent COS
        if: steps.pipeline.outcome == 'success'
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          TENCENT_BUCKET: ${{ secrets.TENCENT_BUCKET }}
          TENCENT_REGION: ${{ secrets.TENCENT_REGION }}
        run: |
          pip install cos-python-sdk-v5 --quiet --break-system-packages
          python upload_to_cos.py
